name: Publish Images

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 0"  # Weekly rebuild: Sunday 4 AM UTC
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - humble-xfce
          - jazzy-xfce
          - rolling-xfce
          - humble-lxde
          - jazzy-lxde
          - rolling-lxde
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Build and push
        run: docker buildx bake ${{ matrix.target }} --push
