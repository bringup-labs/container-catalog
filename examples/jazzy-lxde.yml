services:
  ros2-desktop:
    image: ghcr.io/rahulkatiyar19955/container-catalog:jazzy-lxde
    container_name: ros2-jazzy-lxde
    environment:
      - CONTAINER_USER=ubuntu
      - CONTAINER_PASSWORD=ubuntu
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
    ports:
      - "8080:8080"
      - "5900:5900"
    volumes:
      - ros2_ws:/home/ubuntu/ros2_ws
    security_opt:
      - seccomp:unconfined
    shm_size: "512m"
    restart: unless-stopped

volumes:
  ros2_ws:
